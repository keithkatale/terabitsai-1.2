# Nginx reverse proxy for Apache Guacamole (Cloud Desktop)
# Use with Let's Encrypt: certbot --nginx -d desktop.yourdomain.com
# Place in /etc/nginx/sites-available/ and symlink to sites-enabled, or include from nginx.conf.

# HTTP -> redirect to HTTPS (uncomment after SSL is in place)
# server {
#     listen 80;
#     server_name desktop.yourdomain.com;
#     return 301 https://$server_name$request_uri;
# }

# HTTP (for initial certbot challenge; keep until you have HTTPS)
server {
    listen 80;
    server_name desktop.yourdomain.com;
    client_max_body_size 0;

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $http_connection;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_buffering off;
        proxy_read_timeout 86400;
    }
}

