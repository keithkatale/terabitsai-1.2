name: terabits

services:
  desktop:
    image: lscr.io/linuxserver/webtop:ubuntu-xfce
    container_name: terabits-desktop
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Etc/UTC
      - CUSTOM_USER=admin
      - PASSWORD=${DESKTOP_PASSWORD:-changeme}
    volumes:
      - desktop_data:/config
    ports:
      - "3000:3000"
      - "3001:3001"
    shm_size: "1gb"
    restart: unless-stopped

volumes:
  desktop_data:
